<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Studio Test Player</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #111827; color: #f9fafb; }
    h1 { font-size: 1.5rem; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 13px; background: #1f2937; color: #f9fafb; border: 1px solid #374151; border-radius: 8px; padding: 12px; resize: vertical; }
    .controls { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; align-items: center; }
    select, button { padding: 8px 14px; border: 1px solid #374151; border-radius: 6px; background: #1f2937; color: #f9fafb; font-size: 0.875rem; cursor: pointer; }
    button { background: #2563eb; border-color: #2563eb; font-weight: 500; }
    button:hover { background: #1d4ed8; }
    label { font-size: 0.8rem; color: #9ca3af; }
    #sheet-music { background: #f9fafb; border-radius: 8px; padding: 16px; margin-top: 16px; min-height: 200px; }
    #audio-controls { margin-top: 12px; }
    .note-playing path, .note-playing circle, .note-playing ellipse, .note-playing polygon { fill: #3b82f6 !important; }
    .note-playing path[stroke] { stroke: #3b82f6 !important; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/abcjs@6.6.2/abcjs-audio.css">
</head>
<body>
  <h1>Music Studio Test Player</h1>

  <textarea id="abc">X:1
T:Late Night Bossa
M:4/4
L:1/8
Q:1/4=126
K:C
%%MIDI program 73
"Cmaj7"e2 g2 c'2 ge | "Dm7"f2 a2 d'2 af | "G7"d2 g2 b2 gd | "Cmaj7"e4 c4 |
"Am7"c2 e2 a2 ec | "Dm7"d2 f2 a2 fd | "G7"B2 d2 g2 dB | "Cmaj7"c6 z2 |
"Fmaj7"f2 a2 c'2 af | "Em7"e2 g2 b2 ge | "Am7"c2 e2 a2 ec | "Dm7"d4 f4 |
"G7"g2 f2 e2 d2 | "Cmaj7"e2 d2 c2 B2 | "Dm7"A2 "G7"B2 c2 d2 | "Cmaj7"c6 z2 |]</textarea>

  <div class="controls">
    <div>
      <label>Style</label><br>
      <select id="style">
        <option value="">None</option>
        <option value="rock">Rock</option>
        <option value="jazz">Jazz</option>
        <option value="bossa" selected>Bossa</option>
        <option value="waltz">Waltz</option>
        <option value="march">March</option>
        <option value="reggae">Reggae</option>
        <option value="folk">Folk</option>
        <option value="classical">Classical</option>
      </select>
    </div>
    <div>
      <label>Instrument</label><br>
      <select id="instrument">
        <option value="0">Piano</option>
        <option value="4">Electric Piano</option>
        <option value="6">Harpsichord</option>
        <option value="10">Music Box</option>
        <option value="11">Vibraphone</option>
        <option value="24">Guitar (Nylon)</option>
        <option value="25">Guitar (Steel)</option>
        <option value="40">Violin</option>
        <option value="42">Cello</option>
        <option value="56">Trumpet</option>
        <option value="65">Alto Sax</option>
        <option value="71">Clarinet</option>
        <option value="73" selected>Flute</option>
        <option value="75">Pan Flute</option>
        <option value="114">Steel Drums</option>
      </select>
    </div>
    <div style="align-self: end;">
      <button onclick="render()">Play</button>
    </div>
  </div>

  <div id="audio-controls" class="abcjs-large"></div>
  <div id="sheet-music"></div>

  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.2/dist/abcjs-basic-min.js"></script>
  <script>
    const STYLE_PRESETS = {
      rock: "%%MIDI drumon\n%%MIDI drum dddd 36 42 38 42 90 70 100 70\n%%MIDI gchord fzcz\n%%MIDI chordprog 27\n%%MIDI bassprog 33\n%%MIDI chordvol 70\n%%MIDI bassvol 85",
      jazz: "%%MIDI drumon\n%%MIDI drum dzddzd 51 0 51 51 0 42 80 0 60 80 0 50\n%%MIDI gchord fzcz\n%%MIDI chordprog 0\n%%MIDI bassprog 32\n%%MIDI chordvol 65\n%%MIDI bassvol 80",
      bossa: "%%MIDI drumon\n%%MIDI drum dddddddd 36 76 38 76 36 76 38 76 80 50 70 50 80 50 70 50\n%%MIDI gchord fzcfzc\n%%MIDI chordprog 24\n%%MIDI bassprog 32\n%%MIDI chordvol 65\n%%MIDI bassvol 85",
      waltz: "%%MIDI drumon\n%%MIDI drum dzz 36 0 0 90 0 0\n%%MIDI gchord fcc\n%%MIDI chordprog 0\n%%MIDI bassprog 32\n%%MIDI chordvol 70\n%%MIDI bassvol 80",
      march: "%%MIDI drumon\n%%MIDI drum dddd 38 38 38 38 100 60 80 60\n%%MIDI gchord fzcz\n%%MIDI chordprog 56\n%%MIDI bassprog 32\n%%MIDI chordvol 75\n%%MIDI bassvol 85",
      reggae: "%%MIDI drumon\n%%MIDI drum zdzd 0 42 0 38 0 60 0 90\n%%MIDI gchord zcfz\n%%MIDI chordprog 27\n%%MIDI bassprog 33\n%%MIDI chordvol 65\n%%MIDI bassvol 90",
      folk: "%%MIDI drumon\n%%MIDI drum dzzz 36 0 0 0 50 0 0 0\n%%MIDI gchord fzcz\n%%MIDI chordprog 25\n%%MIDI bassprog 32\n%%MIDI chordvol 70\n%%MIDI bassvol 75",
      classical: "%%MIDI gchord fzcz\n%%MIDI chordprog 48\n%%MIDI bassprog 42\n%%MIDI chordvol 65\n%%MIDI bassvol 75",
    };

    let synthControl = null;
    let highlighted = [];

    const cursorControl = {
      onEvent(ev) {
        highlighted.forEach(el => el.classList.remove('note-playing'));
        highlighted = [];
        if (!ev.elements) return;
        for (const group of ev.elements) {
          for (const el of group) {
            el.classList.add('note-playing');
            highlighted.push(el);
          }
        }
        if (highlighted.length > 0) {
          highlighted[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      },
      onFinished() {
        highlighted.forEach(el => el.classList.remove('note-playing'));
        highlighted = [];
      }
    };

    async function render() {
      const abc = document.getElementById('abc').value;
      const style = document.getElementById('style').value;
      const program = parseInt(document.getElementById('instrument').value);
      const sheetEl = document.getElementById('sheet-music');
      const audioEl = document.getElementById('audio-controls');

      if (synthControl) synthControl.pause();
      sheetEl.innerHTML = '';
      audioEl.innerHTML = '';

      let fullAbc = abc;
      if (style && STYLE_PRESETS[style]) {
        const directives = STYLE_PRESETS[style];
        const m = fullAbc.match(/^(K:[^\n]*\n)/m);
        if (m && m.index !== undefined) {
          const pos = m.index + m[0].length;
          fullAbc = fullAbc.slice(0, pos) + directives + '\n' + fullAbc.slice(pos);
        }
      }

      const visualObj = ABCJS.renderAbc(sheetEl, fullAbc, { responsive: 'resize', add_classes: true });
      if (!visualObj || !visualObj.length) return;

      synthControl = new ABCJS.synth.SynthController();
      synthControl.load(audioEl, cursorControl, { displayLoop: true, displayPlay: true, displayProgress: true, displayWarp: true });
      await synthControl.setTune(visualObj[0], false, { program });
    }

    render();
  </script>
</body>
</html>
